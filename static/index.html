<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>캬앙 다시보기 살리기 캠페인</title>
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><g transform="scale(-1, 1) translate(-384, 0)"><path fill="%23c92519" d="M192 512C86 512 0 426 0 320 0 228.8 130.2 45.9 166.6-3.5 172.5-11.5 181.8-16 191.8-16l.4 0c10 0 19.3 4.5 25.2 12.5 36.4 49.4 166.6 232.3 166.6 323.5 0 106-86 192-192 192zM112 312c0-13.3-10.7-24-24-24s-24 10.7-24 24c0 75.1 60.9 136 136 136 13.3 0 24-10.7 24-24s-10.7-24-24-24c-48.6 0-88-39.4-88-88z"/></g></svg>' />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <h1 id="pageHeading">캬앙 다시보기 살리기 캠페인</h1>
        </div>
        <div class="hero-panel">
          <button id="rankingButton" class="button primary" type="button">참여자 랭킹</button>
          <dl id="metaPanel" class="meta-list"></dl>
        </div>
      </header>

      <section class="notice-panel">
        <p>
          데이터는 60초마다 갱신됩니다.<br />
          페이지 인덱스는 SOOP 데스크탑 뷰 기준과 똑같습니다.<br />
          실시간 갱신은 아니지만 다른분이 관리하시는 스프레드 시트도 있습니다.
          <a
            class="button notice-link"
            href="https://docs.google.com/spreadsheets/d/1tapXvUvHayLAT2bEuLGyxM0wqbi9FdVX28mznUXEsp0/edit?usp=sharing"
            target="_blank"
            rel="noreferrer"
            >바로가기</a
          ><br />
          버그 제보 &amp; 홈페이지 관련 문의 : contact@kyaang.com
        </p>
      </section>

      <section id="vodToolbar" class="toolbar">
        <div id="filterBar" class="filter-bar"></div>
        <label class="search-box">
          <span>검색</span>
          <input id="searchInput" type="search" placeholder="제목으로 찾기" />
        </label>
      </section>

      <section id="vodCard" class="table-card">
        <div class="table-head">
          <div class="table-title-row">
            <h2 id="tableTitle">다시보기 목록</h2>
            <button id="completionStatus" class="completion-status" type="button"></button>
          </div>
        </div>
        <div id="paginationTop" class="pagination pagination-top"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>번호</th>
                <th>업로드</th>
                <th>다시보기 (클릭하면 VOD로 이동)</th>
                <th>조회수</th>
                <th>분류</th>
              </tr>
            </thead>
            <tbody id="vodTableBody"></tbody>
          </table>
        </div>
        <div id="paginationBottom" class="pagination"></div>
      </section>

      <section id="rankingCard" class="table-card hidden">
        <div class="table-head">
          <h2>참여자 랭킹</h2>
          <p id="rankingCaption" class="table-caption"></p>
        </div>
        <div class="table-wrap">
          <table class="ranking-table">
            <thead>
              <tr>
                <th>순위</th>
                <th>닉네임</th>
                <th>ID</th>
                <th>총 별풍선</th>
              </tr>
            </thead>
            <tbody id="rankingTableBody"></tbody>
          </table>
        </div>
      </section>
    </div>

    <template id="emptyStateTemplate">
      <tr>
        <td colspan="4" class="empty-state">조건에 맞는 다시보기가 없습니다.</td>
      </tr>
    </template>

    <template id="emptyRankingTemplate">
      <tr>
        <td colspan="4" class="empty-state">2026년 4월 15일 이후 별풍선 기록이 없습니다.</td>
      </tr>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>

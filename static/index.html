<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>다시보기 백업</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <h1 id="pageHeading">다시보기 살리기 운동</h1>
        </div>
        <div class="hero-panel">
          <button id="rankingButton" class="button primary" type="button">참여자 랭킹</button>
          <dl id="metaPanel" class="meta-list"></dl>
        </div>
      </header>

      <section id="vodToolbar" class="toolbar">
        <div id="filterBar" class="filter-bar"></div>
        <label class="search-box">
          <span>검색</span>
          <input id="searchInput" type="search" placeholder="제목으로 찾기" />
        </label>
      </section>

      <section id="vodCard" class="table-card">
        <div class="table-head">
          <div class="table-title-line">
            <h2 id="tableTitle">다시보기 목록</h2>
            <span id="tableDescription" class="table-description"></span>
          </div>
          <p id="tableCaption" class="table-caption"></p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>업로드</th>
                <th>다시보기</th>
                <th>조회수</th>
                <th>분류</th>
                <th>확인 상태</th>
              </tr>
            </thead>
            <tbody id="vodTableBody"></tbody>
          </table>
        </div>
      </section>

      <section id="rankingCard" class="table-card hidden">
        <div class="table-head">
          <h2>참여자 랭킹</h2>
          <p id="rankingCaption" class="table-caption"></p>
        </div>
        <div class="table-wrap">
          <table class="ranking-table">
            <thead>
              <tr>
                <th>순위</th>
                <th>닉네임</th>
                <th>ID</th>
                <th>총 별풍선</th>
              </tr>
            </thead>
            <tbody id="rankingTableBody"></tbody>
          </table>
        </div>
      </section>
    </div>

    <template id="emptyStateTemplate">
      <tr>
        <td colspan="5" class="empty-state">조건에 맞는 다시보기가 없습니다.</td>
      </tr>
    </template>

    <template id="emptyRankingTemplate">
      <tr>
        <td colspan="4" class="empty-state">2026년 4월 15일 이후 별풍선 기록이 없습니다.</td>
      </tr>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
